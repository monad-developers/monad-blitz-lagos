databases:
  - name: wandash-db
    plan: free
    databaseName: wandasdb
    user: wandas

services:
  - type: web
    name: wandash-server
    runtime: node
    plan: free
    rootDir: wandash/server
    buildCommand: npm install && npx prisma generate && npx prisma db push --accept-data-loss && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wandash-db
          property: connectionString
      - key: RPC_URL
        value: https://testnet-rpc.monad.xyz
      - key: CHAIN_ID
        value: "10143"
      - key: CONTRACT_ADDRESS
        value: "0x575dca87061898C3EbBC2a8F2a49C09120E88951"
      - key: SIGNER_PRIVATE_KEY
        sync: false
      - key: SUBGRAPH_URL
        value: https://api.goldsky.com/api/public/project_cmnn27cgufwam01x895lwbit9/subgraphs/giveaway/1.0.0/gn
      - key: CORS_ORIGIN
        sync: false
